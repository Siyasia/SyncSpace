<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SyncSpace</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <h1>Welcome to SyncSpace</h1>

  <!-- Group Creation Form -->
  <section>
    <h2>Create a New Group</h2>
    <form id="group-form">
      <label for="group-name">Group Name:</label>
      <input type="text" id="group-name" placeholder="Enter Group Name" required />
      <br />
      <label for="group-id">Group ID:</label>
      <input type="text" id="group-id" placeholder="Enter Group ID" required />
      <br />
      <button type="submit">Create Group</button>
    </form>
  </section>

  <!-- Group List -->
  <section>
    <h2>Your Groups</h2>
    <ul id="group-list">
      <!-- Groups will be dynamically inserted here -->
    </ul>
  </section>

  <script src="script.js"></script>
</body>
</html>
