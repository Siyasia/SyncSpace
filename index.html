<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SyncSpace</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <h1>Welcome to SyncSpace</h1>
    <p>Your collaborative study platform</p>
  </header>

  <main>
    <!-- Create Group Section -->
    <section id="create-group-section">
      <h2>Create a Group</h2>
      <input type="text" id="group-name" placeholder="Enter group name" required>
      <button id="create-group-btn">Create Group</button>
      <p id="create-group-message"></p>
    </section>

    <!-- Group Space Section -->
    <section id="group-space-section" style="display: none;">
      <h2>Group Space</h2>
      <p id="group-name-display"></p>
      <div id="group-functions">
        <button id="chat-btn">Chat</button>
        <button id="tasks-btn">Tasks</button>
        <button id="files-btn">Files</button>
      </div>
    </section>
  </main>

  <script src="index.js"></script>
</body>
</html>
